name: HOL Scanner
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run scanner
        uses: hashgraph-online/skill-publish@4d99459187151e4e55600741e3b4320ab66adfd2 # v1
        with:
          mode: validate
          skill-dir: .
