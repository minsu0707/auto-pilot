name: Codex plugin quality gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate plugin structure
        run: python3 scripts/validate_plugin_repo.py

      - name: Validate Python entrypoints
        run: |
          python3 -m py_compile \
            scripts/autopilot.py \
            scripts/record_answer.py \
            scripts/autopilot_lib.py \
            scripts/validate_plugin_repo.py \
            scripts/status.py \
            scripts/team_checkpoint.py
